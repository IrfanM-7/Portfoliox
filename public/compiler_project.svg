<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#1e1e1e"/>
  <rect x="50" y="50" width="700" height="40" rx="5" fill="#2d2d2d" />
  <circle cx="80" cy="70" r="6" fill="#ff5f56" />
  <circle cx="100" cy="70" r="6" fill="#ffbd2e" />
  <circle cx="120" cy="70" r="6" fill="#27c93f" />
  <text x="80" y="140" font-family="monospace" font-size="24" fill="#c678dd">int</text>
  <text x="130" y="140" font-family="monospace" font-size="24" fill="#61afef">main</text>
  <text x="190" y="140" font-family="monospace" font-size="24" fill="#abb2bf">() {</text>
  <text x="120" y="190" font-family="monospace" font-size="24" fill="#c678dd">return</text>
  <text x="210" y="190" font-family="monospace" font-size="24" fill="#d19a66">0</text>
  <text x="230" y="190" font-family="monospace" font-size="24" fill="#abb2bf">;</text>
  <text x="80" y="240" font-family="monospace" font-size="24" fill="#abb2bf">}</text>
  
  <rect x="400" y="100" width="350" height="450" fill="#252526" rx="5" />
  <text x="420" y="140" font-family="monospace" font-size="18" fill="#98c379">// AST Output</text>
  <text x="420" y="180" font-family="monospace" font-size="18" fill="#abb2bf">Program</text>
  <text x="420" y="220" font-family="monospace" font-size="18" fill="#abb2bf">└── FunctionDecl (main)</text>
  <text x="420" y="260" font-family="monospace" font-size="18" fill="#abb2bf">    ├── ReturnType (int)</text>
  <text x="420" y="300" font-family="monospace" font-size="18" fill="#abb2bf">    └── BlockStmt</text>
  <text x="420" y="340" font-family="monospace" font-size="18" fill="#abb2bf">        └── ReturnStmt</text>
  <text x="420" y="380" font-family="monospace" font-size="18" fill="#abb2bf">            └── IntLiteral (0)</text>
  
  <text x="220" y="520" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">C Compiler</text>
  <text x="220" y="560" font-family="Arial, sans-serif" font-size="20" fill="#8fa4c7" text-anchor="middle">Lexical &amp; Syntax Analysis</text>
</svg>
